# ── Server ───────────────────────────────────────────────────────────────────
quarkus.http.port=8090
quarkus.http.host=0.0.0.0

# ── CORS ─────────────────────────────────────────────────────────────────────
# IMPORTANT: In production, set AI_SHIM_ALLOWED_ORIGIN to your exact app origin.
# Never use '*' — it would allow any site to send API keys via X-Provider-Api-Key.
quarkus.http.cors.origins=${AI_SHIM_ALLOWED_ORIGIN:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,X-Provider-Api-Key
quarkus.http.cors.exposed-headers=X-Request-Id,X-RateLimit-Limit,X-RateLimit-Remaining,Retry-After
quarkus.http.cors.access-control-max-age=600

# ── JWT verification ─────────────────────────────────────────────────────────
# Tokens are issued by auth-service (ES256, asymmetric).
# The public key is fetched automatically from the JWKS endpoint — no shared secret needed.
mp.jwt.verify.publickey.location=${AUTH_SERVICE_URL:http://localhost:8703}/.well-known/jwks.json
mp.jwt.verify.publickey.algorithm=ES256
mp.jwt.verify.issuer=${AUTH_SERVICE_URL:http://localhost:8703}

# ── Provider disambiguation ───────────────────────────────────────────────────
# Required when multiple providers are on the classpath.
# Tells LangChain4j which provider backs each named model.
quarkus.langchain4j.openai-vision.chat-model.provider=openai
quarkus.langchain4j.openai-text.chat-model.provider=openai
quarkus.langchain4j.deepseek.chat-model.provider=openai
quarkus.langchain4j.gemini-vision.chat-model.provider=ai-gemini
quarkus.langchain4j.gemini-text.chat-model.provider=ai-gemini
quarkus.langchain4j.anthropic-vision.chat-model.provider=anthropic
quarkus.langchain4j.anthropic-text.chat-model.provider=anthropic
quarkus.langchain4j.azure-openai-vision.chat-model.provider=azure-openai
quarkus.langchain4j.azure-openai-text.chat-model.provider=azure-openai

# ── OpenAI vision (gpt-4o-mini with image support) ───────────────────────────
quarkus.langchain4j.openai.openai-vision.api-key=${OPENAI_API_KEY:DISABLED}
quarkus.langchain4j.openai.openai-vision.base-url=https://api.openai.com/v1
quarkus.langchain4j.openai.openai-vision.timeout=60s
quarkus.langchain4j.openai.openai-vision.chat-model.model-name=${OPENAI_MODEL:gpt-4o-mini}
quarkus.langchain4j.openai.openai-vision.chat-model.temperature=0.1
quarkus.langchain4j.openai.openai-vision.chat-model.max-tokens=2000
quarkus.langchain4j.openai.openai-vision.log-requests=false
quarkus.langchain4j.openai.openai-vision.log-responses=false

# ── OpenAI text (import, insights) ────────────────────────────────────────────
quarkus.langchain4j.openai.openai-text.api-key=${OPENAI_API_KEY:DISABLED}
quarkus.langchain4j.openai.openai-text.base-url=https://api.openai.com/v1
quarkus.langchain4j.openai.openai-text.timeout=120s
quarkus.langchain4j.openai.openai-text.chat-model.model-name=${OPENAI_MODEL:gpt-4o-mini}
quarkus.langchain4j.openai.openai-text.chat-model.temperature=0.1
quarkus.langchain4j.openai.openai-text.chat-model.max-tokens=8000
quarkus.langchain4j.openai.openai-text.log-requests=false
quarkus.langchain4j.openai.openai-text.log-responses=false

# ── DeepSeek (OpenAI-compatible, text only) ───────────────────────────────────
quarkus.langchain4j.openai.deepseek.api-key=${DEEPSEEK_API_KEY:DISABLED}
quarkus.langchain4j.openai.deepseek.base-url=https://api.deepseek.com/v1
quarkus.langchain4j.openai.deepseek.timeout=120s
quarkus.langchain4j.openai.deepseek.chat-model.model-name=${DEEPSEEK_MODEL:deepseek-chat}
quarkus.langchain4j.openai.deepseek.chat-model.temperature=0.1
quarkus.langchain4j.openai.deepseek.chat-model.max-tokens=8000
quarkus.langchain4j.openai.deepseek.log-requests=false
quarkus.langchain4j.openai.deepseek.log-responses=false

# ── Google Gemini vision ──────────────────────────────────────────────────────
quarkus.langchain4j.ai.gemini.gemini-vision.api-key=${GEMINI_API_KEY:DISABLED}
quarkus.langchain4j.ai.gemini.gemini-vision.timeout=60s
quarkus.langchain4j.ai.gemini.gemini-vision.chat-model.model-id=${GEMINI_VISION_MODEL:gemini-2.0-flash}
quarkus.langchain4j.ai.gemini.gemini-vision.chat-model.temperature=0.1
quarkus.langchain4j.ai.gemini.gemini-vision.chat-model.max-output-tokens=2000
quarkus.langchain4j.ai.gemini.gemini-vision.log-requests=false
quarkus.langchain4j.ai.gemini.gemini-vision.log-responses=false

# ── Google Gemini text ────────────────────────────────────────────────────────
quarkus.langchain4j.ai.gemini.gemini-text.api-key=${GEMINI_API_KEY:DISABLED}
quarkus.langchain4j.ai.gemini.gemini-text.timeout=120s
quarkus.langchain4j.ai.gemini.gemini-text.chat-model.model-id=${GEMINI_MODEL:gemini-2.0-flash}
quarkus.langchain4j.ai.gemini.gemini-text.chat-model.temperature=0.1
quarkus.langchain4j.ai.gemini.gemini-text.chat-model.max-output-tokens=8000
quarkus.langchain4j.ai.gemini.gemini-text.log-requests=false
quarkus.langchain4j.ai.gemini.gemini-text.log-responses=false

# ── Anthropic (Claude) vision ─────────────────────────────────────────────────
quarkus.langchain4j.anthropic.anthropic-vision.api-key=${ANTHROPIC_API_KEY:DISABLED}
quarkus.langchain4j.anthropic.anthropic-vision.timeout=60s
quarkus.langchain4j.anthropic.anthropic-vision.chat-model.model-name=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
quarkus.langchain4j.anthropic.anthropic-vision.chat-model.temperature=0.1
quarkus.langchain4j.anthropic.anthropic-vision.chat-model.max-tokens=2000
quarkus.langchain4j.anthropic.anthropic-vision.log-requests=false
quarkus.langchain4j.anthropic.anthropic-vision.log-responses=false

# ── Anthropic (Claude) text ──────────────────────────────────────────────────
quarkus.langchain4j.anthropic.anthropic-text.api-key=${ANTHROPIC_API_KEY:DISABLED}
quarkus.langchain4j.anthropic.anthropic-text.timeout=120s
quarkus.langchain4j.anthropic.anthropic-text.chat-model.model-name=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
quarkus.langchain4j.anthropic.anthropic-text.chat-model.temperature=0.1
quarkus.langchain4j.anthropic.anthropic-text.chat-model.max-tokens=8000
quarkus.langchain4j.anthropic.anthropic-text.log-requests=false
quarkus.langchain4j.anthropic.anthropic-text.log-responses=false

# ── Azure OpenAI vision ──────────────────────────────────────────────────────
quarkus.langchain4j.azure-openai.azure-openai-vision.api-key=${AZURE_OPENAI_API_KEY:DISABLED}
quarkus.langchain4j.azure-openai.azure-openai-vision.resource-name=${AZURE_OPENAI_RESOURCE_NAME:placeholder}
quarkus.langchain4j.azure-openai.azure-openai-vision.timeout=60s
quarkus.langchain4j.azure-openai.azure-openai-vision.chat-model.deployment-name=${AZURE_OPENAI_DEPLOYMENT:gpt-4o-mini}
quarkus.langchain4j.azure-openai.azure-openai-vision.chat-model.temperature=0.1
quarkus.langchain4j.azure-openai.azure-openai-vision.chat-model.max-tokens=2000
quarkus.langchain4j.azure-openai.azure-openai-vision.log-requests=false
quarkus.langchain4j.azure-openai.azure-openai-vision.log-responses=false

# ── Azure OpenAI text ────────────────────────────────────────────────────────
quarkus.langchain4j.azure-openai.azure-openai-text.api-key=${AZURE_OPENAI_API_KEY:DISABLED}
quarkus.langchain4j.azure-openai.azure-openai-text.resource-name=${AZURE_OPENAI_RESOURCE_NAME:placeholder}
quarkus.langchain4j.azure-openai.azure-openai-text.timeout=120s
quarkus.langchain4j.azure-openai.azure-openai-text.chat-model.deployment-name=${AZURE_OPENAI_DEPLOYMENT:gpt-4o-mini}
quarkus.langchain4j.azure-openai.azure-openai-text.chat-model.temperature=0.1
quarkus.langchain4j.azure-openai.azure-openai-text.chat-model.max-tokens=8000
quarkus.langchain4j.azure-openai.azure-openai-text.log-requests=false
quarkus.langchain4j.azure-openai.azure-openai-text.log-responses=false

# ── OpenAI-compatible free-tier providers ─────────────────────────────────────
# These providers use the OpenAI client with a custom base URL injected per-request.
# No static LangChain4j config is needed — users supply their API key via the finance-tracker
# AI Settings page and it is forwarded here in the api_key field of each request.
#
# Groq      — https://console.groq.com/keys        (30 RPM, 1000 RPD, Llama/Kimi models)
# OpenRouter — https://openrouter.ai/keys           (32 free models, auto-fallback routing)
# Mistral   — https://console.mistral.ai/api-keys  (1B tokens/month free)
# Cerebras  — https://cloud.cerebras.ai/           (40 RPM, fastest inference, text-only)
# xAI       — https://console.x.ai/                (Grok models, text-only)
# Cohere    — https://dashboard.cohere.com/api-keys (Command models, text-only)
#
# Optionally set server-wide keys (overridden per-request if client supplies api_key):
# GROQ_API_KEY, OPENROUTER_API_KEY, MISTRAL_API_KEY, CEREBRAS_API_KEY, XAI_API_KEY, COHERE_API_KEY

# ── Ollama (local or cloud — uses OpenAI-compatible API) ─────────────────────
# Point OLLAMA_BASE_URL to a local instance or Ollama Cloud endpoint.
# No special dependency needed — routed through the OpenAI client.
aishim.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434/v1}
aishim.ollama.text-model=${OLLAMA_TEXT_MODEL:llama3.2}
aishim.ollama.vision-model=${OLLAMA_VISION_MODEL:llava}

# ── Image generation ─────────────────────────────────────────────────────────
# Gemini image-gen uses the REST generateContent endpoint with responseModalities=[TEXT, IMAGE].
# Only Gemini is wired today; OpenAI gpt-image-1 can be added without touching the endpoint.
aishim.image.gemini.endpoint=${GEMINI_IMAGE_ENDPOINT:https://generativelanguage.googleapis.com/v1beta}
aishim.image.gemini.default-model=${GEMINI_IMAGE_MODEL:gemini-2.5-flash-image}
aishim.image.max-count=${AI_SHIM_IMAGE_MAX_COUNT:4}

# ── Prompt size limits ───────────────────────────────────────────────────────
aishim.max-prompt-chars=${AI_SHIM_MAX_PROMPT_CHARS:200000}

# ── HTTP size limits ─────────────────────────────────────────────────────────
# Applies to all HTTP bodies (JSON text requests and multipart uploads).
# Raise AI_SHIM_MAX_BODY_SIZE for large PDF/document imports (e.g. 100M).
quarkus.http.limits.max-body-size=${AI_SHIM_MAX_BODY_SIZE:50M}
# Per-file upload limit enforced in application code (bytes). Default 20 MB.
aishim.max-upload-bytes=${AI_SHIM_MAX_UPLOAD_BYTES:20971520}

# ── Rate limiting ─────────────────────────────────────────────────────────────
# Maximum AI requests per user per minute across all invoke endpoints.
aishim.rate-limit.requests-per-minute=${AI_SHIM_RATE_LIMIT_RPM:30}
aishim.rate-limit.requests-per-day=${AI_SHIM_RATE_LIMIT_RPD:1000}

# Rate-limiter storage backend — "memory" (default, in-process) or "redis" (shared).
# Use "redis" for any multi-replica deployment so counters are shared across pods.
aishim.ratelimit.backend=${AI_SHIM_RATELIMIT_BACKEND:memory}

# Redis datasource — consumed only when the Redis backend is active.
# In memory mode the Redis client is never instantiated, so no connection is opened.
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.devservices.enabled=false
# Disable Redis readiness probe by default — it is only meaningful when the Redis backend is active.
# Flip to true in prod profiles that use aishim.ratelimit.backend=redis.
quarkus.redis.health.enabled=${AI_SHIM_REDIS_HEALTH:false}
%test.aishim.ratelimit.backend=memory
%test.quarkus.redis.health.enabled=false

# ── Graceful shutdown ─────────────────────────────────────────────────────────
# Allow up to 30 s for in-flight AI requests to complete before the process exits.
quarkus.shutdown.timeout=30s

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.adars".level=DEBUG
# Suppress LangChain4j HTTP-level logging to prevent API keys leaking in auth headers
quarkus.log.category."dev.langchain4j".level=WARN
quarkus.log.category."dev.ai4j".level=WARN

# Console format — includes MDC requestId and OpenTelemetry traceId/spanId.
# %X{requestId:-        } prints the MDC value, or 8 spaces if absent (e.g. health checks).
# %X{traceId}/%X{spanId} are populated automatically by quarkus-opentelemetry.
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%-30c{2.}] [%X{requestId:-        }] [trace=%X{traceId:-}/%X{spanId:-}] %s%e%n

# ── OpenTelemetry ────────────────────────────────────────────────────────────
# Honors W3C traceparent headers for distributed tracing across services.
# Exporter endpoint defaults to http://localhost:4317 (OTLP/gRPC).
# In prod: set OTEL_EXPORTER_OTLP_ENDPOINT to your collector (Tempo/Jaeger/etc).
quarkus.otel.enabled=${QUARKUS_OTEL_ENABLED:true}
%test.quarkus.otel.enabled=false

# HTTP access log — one line per request at the network level (independent of app logging).
# Uses %U (path only, no query string) instead of %r (full request line) to avoid leaking
# API keys or other secrets that may appear in query parameters.
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern="%h %m %U %s %b %Dms"

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=AI Shim
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Vendor-agnostic AI gateway — OpenAI, Gemini, DeepSeek, Anthropic, Azure OpenAI, Groq, OpenRouter, Mistral, Cerebras, xAI, Cohere
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ── Metrics ───────────────────────────────────────────────────────────────────
quarkus.micrometer.export.prometheus.path=/q/metrics

# ── Audit log ─────────────────────────────────────────────────────────────────
quarkus.log.handler.file.AUDIT.enable=true
quarkus.log.handler.file.AUDIT.path=${LOG_DIR:logs}/audit.log
quarkus.log.handler.file.AUDIT.format=%s%n
quarkus.log.handler.file.AUDIT.rotation.max-file-size=10M
quarkus.log.handler.file.AUDIT.rotation.max-backup-index=5
quarkus.log.category."AUDIT".level=INFO
quarkus.log.category."AUDIT".handlers=AUDIT
quarkus.log.category."AUDIT".use-parent-handlers=false

# ── Dev overrides ─────────────────────────────────────────────────────────────
# In dev, auth-service is expected at localhost:8703 (default AUTH_SERVICE_URL applies).

# ── Prod profile ─────────────────────────────────────────────────────────────
# Activated with -Dquarkus.profile=prod or QUARKUS_PROFILE=prod.
# Drives deployment behind the platform repo (Traefik + Loki + Tempo + Redis).

# Structured JSON console logs so Promtail can parse fields (request_id, user, provider).
# Default (dev/test) keeps the human-readable format; prod flips to JSON.
quarkus.log.console.json=false
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.json.pretty-print=false
%prod.quarkus.log.console.json.additional-field."service.name".value=ai-shim
%prod.quarkus.log.console.json.additional-field."service.name".type=string

# Default to Redis-backed rate limiting in prod. Override with AI_SHIM_RATELIMIT_BACKEND=memory
# if you know there is only ever one replica.
%prod.aishim.ratelimit.backend=${AI_SHIM_RATELIMIT_BACKEND:redis}
%prod.quarkus.redis.health.enabled=${AI_SHIM_REDIS_HEALTH:true}

# OTLP exporter targets the platform's OpenTelemetry collector (Tempo).
# Set OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317 in the Compose env.
%prod.quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
%prod.quarkus.otel.service.name=ai-shim

# ── Test overrides ───────────────────────────────────────────────────────────
%test.mp.jwt.verify.publickey={"kty":"oct","k":"dGVzdC1zZWNyZXQtZm9yLXVuaXQtdGVzdHMtb25seQ"}
%test.quarkus.langchain4j.openai.openai-vision.api-key=test
%test.quarkus.langchain4j.openai.openai-text.api-key=test
%test.quarkus.langchain4j.openai.deepseek.api-key=test
%test.quarkus.langchain4j.ai.gemini.gemini-vision.api-key=test
%test.quarkus.langchain4j.ai.gemini.gemini-text.api-key=test
%test.quarkus.langchain4j.anthropic.anthropic-vision.api-key=test
%test.quarkus.langchain4j.anthropic.anthropic-text.api-key=test
%test.quarkus.langchain4j.azure-openai.azure-openai-vision.api-key=test
%test.quarkus.langchain4j.azure-openai.azure-openai-vision.resource-name=test
%test.quarkus.langchain4j.azure-openai.azure-openai-text.api-key=test
%test.quarkus.langchain4j.azure-openai.azure-openai-text.resource-name=test
%test.aishim.rate-limit.requests-per-minute=100
%test.aishim.rate-limit.requests-per-day=10000
%test.aishim.max-prompt-chars=200000
