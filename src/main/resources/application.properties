# ── Server ───────────────────────────────────────────────────────────────────
quarkus.http.port=8090
quarkus.http.host=0.0.0.0

# ── CORS ─────────────────────────────────────────────────────────────────────
quarkus.http.cors.origins=${AI_WRAP_ALLOWED_ORIGIN:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type
quarkus.http.cors.exposed-headers=X-Request-Id,X-RateLimit-Limit,X-RateLimit-Remaining,Retry-After

# ── JWT verification ─────────────────────────────────────────────────────────
mp.jwt.verify.publickey.algorithm=HS256
smallrye.jwt.verify.secret.key=${JWT_SECRET}
mp.jwt.verify.issuer=IGNORE

# ── Provider disambiguation ───────────────────────────────────────────────────
# Required when multiple providers are on the classpath.
# Tells LangChain4j which provider backs each named model.
quarkus.langchain4j.openai-vision.chat-model.provider=openai
quarkus.langchain4j.openai-text.chat-model.provider=openai
quarkus.langchain4j.deepseek.chat-model.provider=openai
quarkus.langchain4j.gemini-vision.chat-model.provider=ai-gemini
quarkus.langchain4j.gemini-text.chat-model.provider=ai-gemini

# ── OpenAI vision (gpt-4o-mini with image support) ───────────────────────────
quarkus.langchain4j.openai.openai-vision.api-key=${OPENAI_API_KEY:DISABLED}
quarkus.langchain4j.openai.openai-vision.base-url=https://api.openai.com/v1
quarkus.langchain4j.openai.openai-vision.timeout=60s
quarkus.langchain4j.openai.openai-vision.chat-model.model-name=${OPENAI_MODEL:gpt-4o-mini}
quarkus.langchain4j.openai.openai-vision.chat-model.temperature=0.1
quarkus.langchain4j.openai.openai-vision.chat-model.max-tokens=2000

# ── OpenAI text (import, insights) ────────────────────────────────────────────
quarkus.langchain4j.openai.openai-text.api-key=${OPENAI_API_KEY:DISABLED}
quarkus.langchain4j.openai.openai-text.base-url=https://api.openai.com/v1
quarkus.langchain4j.openai.openai-text.timeout=120s
quarkus.langchain4j.openai.openai-text.chat-model.model-name=${OPENAI_MODEL:gpt-4o-mini}
quarkus.langchain4j.openai.openai-text.chat-model.temperature=0.1
quarkus.langchain4j.openai.openai-text.chat-model.max-tokens=8000

# ── DeepSeek (OpenAI-compatible, text only) ───────────────────────────────────
quarkus.langchain4j.openai.deepseek.api-key=${DEEPSEEK_API_KEY:DISABLED}
quarkus.langchain4j.openai.deepseek.base-url=https://api.deepseek.com/v1
quarkus.langchain4j.openai.deepseek.timeout=120s
quarkus.langchain4j.openai.deepseek.chat-model.model-name=${DEEPSEEK_MODEL:deepseek-chat}
quarkus.langchain4j.openai.deepseek.chat-model.temperature=0.1
quarkus.langchain4j.openai.deepseek.chat-model.max-tokens=8000

# ── Google Gemini vision ──────────────────────────────────────────────────────
quarkus.langchain4j.ai.gemini.gemini-vision.api-key=${GEMINI_API_KEY:DISABLED}
quarkus.langchain4j.ai.gemini.gemini-vision.timeout=60s
quarkus.langchain4j.ai.gemini.gemini-vision.chat-model.model-id=${GEMINI_VISION_MODEL:gemini-2.0-flash}
quarkus.langchain4j.ai.gemini.gemini-vision.chat-model.temperature=0.1
quarkus.langchain4j.ai.gemini.gemini-vision.chat-model.max-output-tokens=2000

# ── Google Gemini text ────────────────────────────────────────────────────────
quarkus.langchain4j.ai.gemini.gemini-text.api-key=${GEMINI_API_KEY:DISABLED}
quarkus.langchain4j.ai.gemini.gemini-text.timeout=120s
quarkus.langchain4j.ai.gemini.gemini-text.chat-model.model-id=${GEMINI_MODEL:gemini-2.0-flash}
quarkus.langchain4j.ai.gemini.gemini-text.chat-model.temperature=0.1
quarkus.langchain4j.ai.gemini.gemini-text.chat-model.max-output-tokens=8000

# ── Ollama (disabled — uncomment Ollama dependency in pom.xml to enable) ──────
# quarkus.langchain4j.ollama.ollama-vision.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
# quarkus.langchain4j.ollama.ollama-vision.chat-model.model-id=${OLLAMA_VISION_MODEL:llava}
# quarkus.langchain4j.ollama.ollama-text.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
# quarkus.langchain4j.ollama.ollama-text.chat-model.model-id=${OLLAMA_TEXT_MODEL:llama3.2}

# ── PaddleOCR sidecar REST client ─────────────────────────────────────────────
quarkus.rest-client.paddle-ocr.url=${PADDLE_OCR_URL:http://paddle-ocr:8091}
quarkus.rest-client.paddle-ocr.connect-timeout=5000
quarkus.rest-client.paddle-ocr.read-timeout=60000
aiwrap.paddle-ocr.enabled=${PADDLE_OCR_ENABLED:false}

# ── Prompt size limits ───────────────────────────────────────────────────────
aiwrap.max-prompt-chars=${AI_WRAP_MAX_PROMPT_CHARS:200000}

# ── HTTP size limits ─────────────────────────────────────────────────────────
# Applies to all HTTP bodies (JSON text requests and multipart uploads).
# Raise AI_WRAP_MAX_BODY_SIZE for large PDF/document imports (e.g. 100M).
quarkus.http.limits.max-body-size=${AI_WRAP_MAX_BODY_SIZE:50M}
# Per-file upload limit enforced in application code (bytes). Default 20 MB.
aiwrap.max-upload-bytes=${AI_WRAP_MAX_UPLOAD_BYTES:20971520}

# ── Rate limiting ─────────────────────────────────────────────────────────────
# Maximum AI requests per user per minute across all invoke endpoints.
aiwrap.rate-limit.requests-per-minute=${AI_WRAP_RATE_LIMIT_RPM:30}
aiwrap.rate-limit.requests-per-day=${AI_WRAP_RATE_LIMIT_RPD:1000}

# ── Graceful shutdown ─────────────────────────────────────────────────────────
# Allow up to 30 s for in-flight AI requests to complete before the process exits.
quarkus.shutdown.timeout=30s

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.adars".level=DEBUG

# Console format — includes MDC requestId between brackets after the logger name.
# %X{requestId:-        } prints the MDC value, or 8 spaces if absent (e.g. health checks).
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%-30c{2.}] [%X{requestId:-        }] %s%e%n

# HTTP access log — one line per request at the network level (independent of app logging).
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern="%h \"%r\" %s %b %Dms"

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=AI Wrap
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Vendor-agnostic AI gateway — OpenAI, Gemini, DeepSeek, PaddleOCR
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ── Metrics ───────────────────────────────────────────────────────────────────
quarkus.micrometer.export.prometheus.path=/q/metrics

# ── Audit log ─────────────────────────────────────────────────────────────────
quarkus.log.handler.file.AUDIT.enable=true
quarkus.log.handler.file.AUDIT.path=${LOG_DIR:logs}/audit.log
quarkus.log.handler.file.AUDIT.format=%s%n
quarkus.log.handler.file.AUDIT.rotation.max-file-size=10M
quarkus.log.handler.file.AUDIT.rotation.max-backup-index=5
quarkus.log.category."AUDIT".level=INFO
quarkus.log.category."AUDIT".handlers=AUDIT
quarkus.log.category."AUDIT".use-parent-handlers=false

# ── Dev overrides ─────────────────────────────────────────────────────────────
%dev.mp.jwt.verify.issuer=IGNORE

# ── Test overrides ───────────────────────────────────────────────────────────
%test.mp.jwt.verify.secret.key=test-secret-for-unit-tests-only
%test.quarkus.langchain4j.openai.openai-vision.api-key=test
%test.quarkus.langchain4j.openai.openai-text.api-key=test
%test.quarkus.langchain4j.openai.deepseek.api-key=test
%test.quarkus.langchain4j.ai.gemini.gemini-vision.api-key=test
%test.quarkus.langchain4j.ai.gemini.gemini-text.api-key=test
%test.aiwrap.rate-limit.requests-per-minute=100
%test.aiwrap.rate-limit.requests-per-day=10000
%test.aiwrap.max-prompt-chars=200000
